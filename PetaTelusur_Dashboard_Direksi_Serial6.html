<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peta Telusur Regulasi RS — Dashboard Direksi Serial #6</title>
<style>
  :root {
    --navy:     #1F3864;
    --navy-lt:  #2C4A7C;
    --orange:   #E8952A;
    --red-dk:   #B01020;
    --red:      #C0392B;
    --blue-dk:  #1A5276;
    --blue:     #2471A3;
    --blue-lt:  #2E86C1;
    --green:    #1A6B3A;
    --purple:   #6C3483;
    --brown:    #935116;
    --slate:    #17202A;
    --gray-100: #F4F6F9;
    --gray-200: #E8ECF2;
    --gray-300: #C5CDD8;
    --gray-500: #7F8C8D;
    --white:    #FFFFFF;
    --warn:     #FEF9E7;
    --warn-bd:  #F0C040;
    --kritis:   #FDEDEC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--gray-100);
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── TOP HEADER ── */
  .top-bar {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 100%);
    color: var(--white);
    padding: 18px 24px 14px;
    border-bottom: 3px solid var(--orange);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .top-bar h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .3px; }
  .top-bar p  { font-size: .78rem; color: rgba(255,255,255,.75); margin-top: 3px; }
  .top-controls {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; align-items: center;
  }
  .mode-btn {
    padding: 6px 16px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,.5);
    background: transparent; color: var(--white); font-size: .78rem; cursor: pointer;
    transition: all .2s;
  }
  .mode-btn.active, .mode-btn:hover {
    background: var(--orange); border-color: var(--orange); color: var(--white); font-weight: 700;
  }
  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .badge {
    font-size: .68rem; padding: 2px 9px; border-radius: 10px;
    color: #fff; font-weight: 600; cursor: pointer; opacity: .85; transition: opacity .15s;
  }
  .badge:hover { opacity: 1; }

  /* ── LAYOUT ── */
  .layout { display: flex; gap: 0; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 280px; min-width: 240px; background: var(--white);
    border-right: 1px solid var(--gray-200); height: calc(100vh - 96px);
    overflow-y: auto; position: sticky; top: 96px;
  }
  .sidebar-title {
    font-size: .7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--gray-500); padding: 12px 14px 6px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px; cursor: pointer; border-left: 3px solid transparent;
    transition: all .15s; font-size: .8rem;
  }
  .sidebar-item:hover { background: var(--gray-100); }
  .sidebar-item.active {
    background: var(--gray-100); font-weight: 600;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .sidebar-sep { height: 1px; background: var(--gray-200); margin: 6px 14px; }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; padding: 20px 24px; overflow-y: auto; min-width: 0; }

  /* ── MODE HEADER ── */
  .mode-header {
    background: linear-gradient(90deg, var(--navy) 0%, var(--navy-lt) 100%);
    color: white; border-radius: 10px; padding: 14px 20px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .mode-icon { font-size: 1.6rem; }
  .mode-header h2 { font-size: .95rem; font-weight: 700; }
  .mode-header p { font-size: .75rem; color: rgba(255,255,255,.75); margin-top: 2px; }

  /* ── CHAIN VISUAL ── */
  .chain-bar {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
    font-size: .72rem;
  }
  .chain-node {
    padding: 4px 10px; border-radius: 12px; color: white; font-weight: 600;
    cursor: pointer; transition: transform .1s, box-shadow .1s;
  }
  .chain-node:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.2); }
  .chain-arrow { color: var(--gray-500); font-size: .9rem; }

  /* ── DOCUMENT CARD ── */
  .doc-card {
    background: var(--white); border-radius: 10px;
    border: 1px solid var(--gray-200); margin-bottom: 10px;
    overflow: hidden; transition: box-shadow .2s;
  }
  .doc-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); }
  .doc-card.kritis { border-left: 4px solid var(--red); background: var(--kritis); }

  .card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; cursor: pointer; user-select: none;
  }
  .card-layer-badge {
    font-size: .65rem; font-weight: 700; padding: 3px 8px;
    border-radius: 10px; color: white; flex-shrink: 0;
  }
  .card-kode {
    font-family: 'Courier New', monospace; font-weight: 700;
    font-size: .8rem; color: var(--navy); flex-shrink: 0;
  }
  .card-nama { font-size: .83rem; font-weight: 600; flex: 1; min-width: 0; }
  .card-domain {
    font-size: .65rem; padding: 2px 8px; border-radius: 8px;
    color: white; flex-shrink: 0;
  }
  .card-toggle {
    font-size: .75rem; color: var(--gray-500); flex-shrink: 0;
    transition: transform .2s;
  }
  .card-toggle.open { transform: rotate(180deg); }

  .card-body {
    display: none; padding: 0 14px 14px; border-top: 1px solid var(--gray-200);
  }
  .card-body.open { display: block; }

  /* ── DETAIL GRID ── */
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 12px;
  }
  .detail-box {
    background: var(--gray-100); border-radius: 8px; padding: 10px 12px;
  }
  .detail-box.full { grid-column: 1 / -1; }
  .detail-label {
    font-size: .65rem; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; color: var(--gray-500); margin-bottom: 5px;
  }
  .detail-val { font-size: .78rem; line-height: 1.5; }

  /* ── REGULASI REFS ── */
  .ref-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .ref-tag {
    font-size: .67rem; padding: 3px 8px; border-radius: 6px;
    border: 1px solid; font-weight: 600; cursor: default;
  }
  .ref-starkes { background: #EAF6FF; border-color: #2471A3; color: #1A5276; }
  .ref-pmk     { background: #EAF8EA; border-color: #1A6B3A; color: #1A6B3A; }
  .ref-kmk     { background: #FFF4E6; border-color: #E8952A; color: #B06010; }
  .ref-uu      { background: #F3EAF8; border-color: #6C3483; color: #6C3483; }
  .ref-pp      { background: #FEEEEE; border-color: #C0392B; color: #922B21; }
  .ref-ext     { background: #F0F0F0; border-color: #888; color: #444; }

  /* ── CHAIN LINKS ── */
  .chain-links { margin-top: 10px; }
  .chain-links-title {
    font-size: .67rem; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; color: var(--gray-500); margin-bottom: 6px;
  }
  .chain-link-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; border-radius: 6px; cursor: pointer;
    font-size: .75rem; transition: background .15s;
    border: 1px solid var(--gray-200); margin-bottom: 4px;
    background: white;
  }
  .chain-link-item:hover { background: var(--gray-100); }
  .chain-link-dir { font-size: .65rem; color: var(--gray-500); flex-shrink: 0; }

  /* ── STATUS ── */
  .status-row { display: flex; gap: 6px; align-items: center; margin-top: 8px; }
  .status-btn {
    padding: 4px 10px; border-radius: 12px; border: 1.5px solid var(--gray-300);
    background: white; font-size: .7rem; cursor: pointer; transition: all .15s;
  }
  .status-btn.ada    { background: #1A6B3A; color: white; border-color: #1A6B3A; }
  .status-btn.tidak  { background: var(--red); color: white; border-color: var(--red); }
  .status-label { font-size: .7rem; color: var(--gray-500); }

  /* ── SEARCH ── */
  .search-box {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    border: 1.5px solid var(--gray-300); font-size: .8rem;
    margin-bottom: 16px; outline: none;
    transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--blue); }

  /* ── GAP NOTE ── */
  .gap-note {
    background: var(--warn); border-left: 3px solid var(--warn-bd);
    border-radius: 0 6px 6px 0; padding: 7px 10px;
    font-size: .74rem; margin-top: 8px; line-height: 1.5;
  }
  .gap-kritis { background: var(--kritis); border-color: var(--red); font-weight: 600; }

  /* ── SCROLL AREA ── */
  .doc-section { margin-bottom: 16px; }
  .section-header {
    display: flex; align-items: center; gap: 8px;
    font-size: .8rem; font-weight: 700; color: var(--white);
    padding: 8px 14px; border-radius: 8px; margin-bottom: 8px;
  }
  .section-count {
    font-size: .65rem; background: rgba(255,255,255,.25);
    padding: 2px 7px; border-radius: 8px;
  }

  /* ── FORMULIR DATA FIELDS ── */
  .fields-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .field-chip {
    font-size: .67rem; background: var(--navy); color: white;
    padding: 2px 7px; border-radius: 8px;
  }

  /* hidden */
  .hidden { display: none !important; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// ── INDEX ──
const BY_ID = {};
DOCS.forEach(d => BY_ID[d.id] = d);

// ── STATE ──
let currentMode = "topdown";
let activeFilter = null;  // layer or domain
let filterType = null;    // "layer" or "domain"

// ============================================================
// RENDER ENGINE
// ============================================================
function init() {
  renderBadges();
  renderSidebar();
  renderMode();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById("btn-topdown").classList.toggle("active", mode === "topdown");
  document.getElementById("btn-bottomup").classList.toggle("active", mode === "bottomup");
  activeFilter = null; filterType = null;
  renderSidebar();
  renderMode();
}

function renderBadges() {
  const row = document.getElementById("badgeRow");
  const domains = [...new Set(DOCS.map(d=>d.domain))];
  row.innerHTML = domains.map(dom => {
    const col = DOMAIN_COLORS[dom] || "#555";
    return `<span class="badge" style="background:${col}" onclick="filterByDomain('${dom}')">${dom}</span>`;
  }).join("");
}

function renderSidebar() {
  // Layers
  const si = document.getElementById("sidebarItems");
  si.innerHTML = LAYERS.map(l => {
    const col = LAYER_COLORS[l];
    const cnt = DOCS.filter(d=>d.layer===l).length;
    const active = filterType==="layer" && activeFilter===l ? "active" : "";
    return `<div class="sidebar-item ${active}" onclick="filterByLayer('${l}')" style="border-left-color:${col}">
      <span class="dot" style="background:${col}"></span>
      <span>${l}</span>
      <span style="margin-left:auto;font-size:.65rem;color:#999">${cnt}</span>
    </div>`;
  }).join("");

  // Domains
  const sd = document.getElementById("sidebarDomains");
  const domains = [...new Set(DOCS.map(d=>d.domain))];
  sd.innerHTML = domains.map(dom => {
    const col = DOMAIN_COLORS[dom] || "#555";
    const cnt = DOCS.filter(d=>d.domain===dom).length;
    const active = filterType==="domain" && activeFilter===dom ? "active" : "";
    return `<div class="sidebar-item ${active}" onclick="filterByDomain('${dom}')" style="border-left-color:${col}">
      <span class="dot" style="background:${col}"></span>
      <span>${dom}</span>
      <span style="margin-left:auto;font-size:.65rem;color:#999">${cnt}</span>
    </div>`;
  }).join("");
}

function filterByLayer(layer) {
  if (filterType==="layer" && activeFilter===layer) {
    activeFilter=null; filterType=null;
  } else {
    activeFilter=layer; filterType="layer";
  }
  renderSidebar(); renderMode();
}

function filterByDomain(dom) {
  if (filterType==="domain" && activeFilter===dom) {
    activeFilter=null; filterType=null;
  } else {
    activeFilter=dom; filterType="domain";
  }
  renderSidebar(); renderMode();
}

function filterDocs() {
  const q = document.getElementById("globalSearch").value.toLowerCase();
  document.querySelectorAll(".doc-card").forEach(card => {
    const text = card.textContent.toLowerCase();
    card.classList.toggle("hidden", q.length>1 && !text.includes(q));
  });
}

function renderMode() {
  const hdr = document.getElementById("modeHeader");
  const chain = document.getElementById("chainBar");
  const list = document.getElementById("docList");

  if (currentMode === "topdown") {
    hdr.innerHTML = `<div class="mode-header">
      <div class="mode-icon">⬇️</div>
      <div><h2>Mode Top-Down: SK Payung → Formulir</h2>
      <p>Klik dokumen untuk lihat turunannya. Setiap layer berwarna berbeda. Navigasi dua arah tersedia di detail.</p></div>
    </div>`;
    chain.innerHTML = renderChainBar("topdown");
    list.innerHTML = renderLayersTopDown();
  } else {
    hdr.innerHTML = `<div class="mode-header">
      <div class="mode-icon">⬆️</div>
      <div><h2>Mode Bottom-Up: Jenis Data / Formulir → SK Payung</h2>
      <p>Mulai dari data yang dibutuhkan dashboard, lacak ke atas sampai SK Payung yang melegitimasi</p></div>
    </div>`;
    chain.innerHTML = renderChainBar("bottomup");
    list.innerHTML = renderLayersBottomUp();
  }
}

function renderChainBar(mode) {
  const nodes = mode==="topdown" ? LAYERS : [...LAYERS].reverse();
  return `<div class="chain-bar">
    <strong style="font-size:.7rem;color:#555;margin-right:4px">RANTAI:</strong>
    ${nodes.map((l,i) => {
      const col = LAYER_COLORS[l];
      return `<span class="chain-node" style="background:${col}" onclick="filterByLayer('${l}')">${l}</span>
              ${i<nodes.length-1 ? `<span class="chain-arrow">${mode==="topdown"?"→":"→"}</span>` : ""}`;
    }).join("")}
  </div>`;
}

function getFilteredDocs(layer) {
  let docs = DOCS.filter(d => d.layer === layer);
  if (filterType === "layer" && activeFilter !== layer) return [];
  if (filterType === "domain") docs = docs.filter(d => d.domain === activeFilter);
  return docs;
}

function renderLayersTopDown() {
  return LAYERS.map(layer => {
    const docs = getFilteredDocs(layer);
    if (docs.length === 0) return "";
    const col = LAYER_COLORS[layer];
    return `<div class="doc-section">
      <div class="section-header" style="background:${col}">
        ${layer} <span class="section-count">${docs.length} dokumen</span>
      </div>
      ${docs.map(d => renderCard(d, "topdown")).join("")}
    </div>`;
  }).join("");
}

function renderLayersBottomUp() {
  const reversed = [...LAYERS].reverse();
  return reversed.map(layer => {
    const docs = getFilteredDocs(layer);
    if (docs.length === 0) return "";
    const col = LAYER_COLORS[layer];
    return `<div class="doc-section">
      <div class="section-header" style="background:${col}">
        ${layer} <span class="section-count">${docs.length} dokumen</span>
      </div>
      ${docs.map(d => renderCard(d, "bottomup")).join("")}
    </div>`;
  }).join("");
}

function renderCard(doc, mode) {
  const lc = LAYER_COLORS[doc.layer];
  const dc = DOMAIN_COLORS[doc.domain] || "#555";
  return `<div class="doc-card ${doc.kritis?"kritis":""}" id="card-${doc.id}">
    <div class="card-head" onclick="toggleCard('${doc.id}')">
      <span class="card-layer-badge" style="background:${lc}">${doc.layer}</span>
      <span class="card-kode">${doc.id}</span>
      <span class="card-nama">${doc.nama}</span>
      <span class="card-domain" style="background:${dc}">${doc.domain}</span>
      ${doc.kritis ? '<span style="font-size:.65rem;background:#B01020;color:white;padding:2px 6px;border-radius:8px;flex-shrink:0">⚠ KRITIS</span>' : ""}
      <span class="card-toggle" id="toggle-${doc.id}">▼</span>
    </div>
    <div class="card-body" id="body-${doc.id}">
      ${renderCardBody(doc, mode)}
    </div>
  </div>`;
}

function renderCardBody(doc, mode) {
  // Data fields chips
  const chips = doc.dataFields.map(f => `<span class="field-chip">${f}</span>`).join("");

  // Regulasi refs
  const starkes = doc.starkes.map(s => `<span class="ref-tag ref-starkes" title="STARKES 2024 (KMK 1596/2024)">📋 ${s}</span>`).join("");
  const pmk6 = doc.pmk6.map(p => `<span class="ref-tag ref-pmk" title="PMK No.6/2026">🏥 ${p}</span>`).join("");
  const kmk = (doc.kmk||[]).map(k => `<span class="ref-tag ref-kmk" title="KMK (Keputusan Menteri Kesehatan)">📄 ${k}</span>`).join("");
  const ext = (doc.regulasiLain||[]).map(r => `<span class="ref-tag ref-ext" title="Regulasi eksternal pendukung">📌 ${r}</span>`).join("");

  // Chain links
  let chainHTML = "";
  if (mode === "topdown") {
    if (doc.turunan.length > 0) {
      chainHTML += `<div class="chain-links">
        <div class="chain-links-title">⬇️ Turunan Langsung (klik untuk navigasi)</div>
        ${doc.turunan.map(id => {
          const td = BY_ID[id];
          if (!td) return "";
          const lc = LAYER_COLORS[td.layer];
          return `<div class="chain-link-item" onclick="scrollToCard('${id}')">
            <span class="chain-link-dir">→</span>
            <span class="card-layer-badge" style="background:${lc};font-size:.6rem;padding:2px 6px">${td.layer}</span>
            <span style="font-size:.7rem;font-weight:600;color:#1F3864">${id}</span>
            <span style="font-size:.7rem;flex:1">${td.nama}</span>
          </div>`;
        }).join("")}
      </div>`;
    }
    if (doc.payung.length > 0) {
      chainHTML += `<div class="chain-links" style="margin-top:8px">
        <div class="chain-links-title">⬆️ Dokumen Payung</div>
        ${doc.payung.map(id => {
          const pd = BY_ID[id];
          if (!pd) return "";
          const lc = LAYER_COLORS[pd.layer];
          return `<div class="chain-link-item" onclick="scrollToCard('${id}')">
            <span class="chain-link-dir">↑</span>
            <span class="card-layer-badge" style="background:${lc};font-size:.6rem;padding:2px 6px">${pd.layer}</span>
            <span style="font-size:.7rem;font-weight:600;color:#1F3864">${id}</span>
            <span style="font-size:.7rem;flex:1">${pd.nama}</span>
          </div>`;
        }).join("")}
      </div>`;
    }
  } else {
    // bottom-up: show payung first, then turunan
    if (doc.payung.length > 0) {
      chainHTML += `<div class="chain-links">
        <div class="chain-links-title">⬆️ Dokumen Payung (lacak ke atas)</div>
        ${doc.payung.map(id => {
          const pd = BY_ID[id];
          if (!pd) return "";
          const lc = LAYER_COLORS[pd.layer];
          return `<div class="chain-link-item" onclick="scrollToCard('${id}')">
            <span class="chain-link-dir">↑</span>
            <span class="card-layer-badge" style="background:${lc};font-size:.6rem;padding:2px 6px">${pd.layer}</span>
            <span style="font-size:.7rem;font-weight:600;color:#1F3864">${id}</span>
            <span style="font-size:.7rem;flex:1">${pd.nama}</span>
          </div>`;
        }).join("")}
      </div>`;
    }
    if (doc.turunan.length > 0) {
      chainHTML += `<div class="chain-links" style="margin-top:8px">
        <div class="chain-links-title">⬇️ Dokumen Turunan</div>
        ${doc.turunan.map(id => {
          const td = BY_ID[id];
          if (!td) return "";
          const lc = LAYER_COLORS[td.layer];
          return `<div class="chain-link-item" onclick="scrollToCard('${id}')">
            <span class="chain-link-dir">→</span>
            <span class="card-layer-badge" style="background:${lc};font-size:.6rem;padding:2px 6px">${td.layer}</span>
            <span style="font-size:.7rem;font-weight:600;color:#1F3864">${id}</span>
            <span style="font-size:.7rem;flex:1">${td.nama}</span>
          </div>`;
        }).join("")}
      </div>`;
    }
  }

  // Status toggle
  const statusKey = "status_"+doc.id;
  const saved = localStorage ? (localStorage.getItem(statusKey)||"") : "";

  return `
    <div class="detail-grid">
      <div class="detail-box">
        <div class="detail-label">📊 Indikator Dashboard Yang Dipasok</div>
        <div class="detail-val">${doc.indikator.join(" • ")}</div>
      </div>
      <div class="detail-box">
        <div class="detail-label">💾 Data Fields / Jenis Data</div>
        <div class="fields-grid">${chips}</div>
      </div>
      <div class="detail-box full">
        <div class="detail-label">📋 Rujukan STARKES 2024 (KMK 1596/2024)</div>
        <div class="ref-row">${starkes}</div>
      </div>
      <div class="detail-box full">
        <div class="detail-label">🏥 Rujukan PMK No.6/2026</div>
        <div class="ref-row">${pmk6}${kmk}</div>
      </div>
      <div class="detail-box full">
        <div class="detail-label">📌 Regulasi Lain Yang Masih Berlaku</div>
        <div class="ref-row">${ext}</div>
      </div>
      <div class="detail-box full">
        <div class="detail-label">⚠️ Gap & Catatan Validasi</div>
        <div class="gap-note ${doc.kritis?"gap-kritis":""}">${doc.kritis?"⚠️ ":""}${doc.gap}</div>
      </div>
      <div class="detail-box full">
        <div class="detail-label">✅ Status Validasi</div>
        <div class="status-row">
          <span class="status-label">Dokumen ini:</span>
          <button class="status-btn ${saved==='ada'?'ada':''}" onclick="setStatus('${doc.id}','ada',this)">✓ Ada & Berlaku</button>
          <button class="status-btn ${saved==='tidak'?'tidak':''}" onclick="setStatus('${doc.id}','tidak',this)">✗ Belum Ada / Expired</button>
          <span id="status-label-${doc.id}" style="font-size:.7rem;color:#888;margin-left:8px">${saved?'Status tersimpan':'Belum diisi'}</span>
        </div>
      </div>
    </div>
    ${chainHTML}
  `;
}

function toggleCard(id) {
  const body = document.getElementById("body-"+id);
  const tog = document.getElementById("toggle-"+id);
  const open = body.classList.toggle("open");
  tog.classList.toggle("open", open);
}

function scrollToCard(id) {
  // Switch mode if needed, then scroll
  const el = document.getElementById("card-"+id);
  if (el) {
    el.scrollIntoView({behavior:"smooth", block:"center"});
    // Open it
    const body = document.getElementById("body-"+id);
    const tog = document.getElementById("toggle-"+id);
    if (!body.classList.contains("open")) {
      body.classList.add("open");
      tog.classList.add("open");
    }
    // Flash
    el.style.boxShadow = "0 0 0 3px #E8952A";
    setTimeout(()=>{ el.style.boxShadow=""; }, 1500);
  } else {
    // Need to render the other mode first - just alert
    alert(`Navigasi ke dokumen ${id} — gunakan pencarian atau filter untuk menemukan dokumen ini.`);
  }
}

function setStatus(id, status, btn) {
  if (localStorage) localStorage.setItem("status_"+id, status);
  // Update buttons
  const card = document.getElementById("body-"+id);
  card.querySelectorAll(".status-btn").forEach(b => {
    b.classList.remove("ada","tidak");
  });
  btn.classList.add(status);
  document.getElementById("status-label-"+id).textContent = status==="ada"?"✓ Tersimpan — Ada & Berlaku":"✗ Tersimpan — Belum Ada / Expired";
}

// ── INIT ──
window.onload = init;
</script>
